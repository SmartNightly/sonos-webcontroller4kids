version: '3.8'

services:
  sonos-webcontroller:
    # Image wird automatisch von Docker Hub gepullt (via GitHub Actions)
    image: smartnightly/sonos-webcontroller4kids:latest
    
    container_name: sonos-webcontroller4kids
    
    # Ändere hier den Port direkt (Format: "host-port:container-port")
    # Beispiel für Port 8080: "8080:8080"
    ports:
      - "3344:3344"
    
    volumes:
      # Passe den Pfad für Synology an:
      # z.B. /volume1/docker/sonos-webcontroller4kids/media-data
      - ./media-data:/app/media-data
    
    restart: unless-stopped
    
    environment:
      - NODE_ENV=production
      # Ändere hier den internen Port (muss mit container-port oben übereinstimmen)
      - PORT=3344
